services:
  - type: web
    name: photographing-cheaters-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: blakedb
      - key: GOOGLE_CLIENT_ID
        value: 74349467717-p52k4k4e74p93baqaqkv754le0nb46ap.apps.googleusercontent.com
      - key: FRONTEND_ORIGIN
        sync: false
